packages:
  - "packages/*"


# 24 hours (1440 minutes); delay before newly published versions may be installed.
minimumReleaseAge: 1440

# https://pnpm.io/settings#verifydepsbeforerun
verifyDepsBeforeRun: error

trustPolicy: no-downgrade

# https://pnpm.io/settings#blockexoticsubdeps
blockExoticSubdeps: true

# Dependency install scripts: fail install (CI and local) unless the package is allowlisted below.
# https://pnpm.io/settings#strictdepbuilds — errors on unapproved scripts (not just warnings).
strictDepBuilds: true
# https://pnpm.io/settings#allowbuilds
allowBuilds: {}